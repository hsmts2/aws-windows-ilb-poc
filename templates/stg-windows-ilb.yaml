AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Staging AWS Windows Server internal load balancer PoC.
  This template uses sample parameters only.

Parameters:
  ProjectName:
    Type: String
    Default: aws-windows-ilb-poc
    MinLength: 3
    MaxLength: 19
    AllowedPattern: '^[a-z0-9-]+$'
    Description: Prefix used for resource names. Keep it within 19 characters because ALB and target group names have a 32-character limit.

  EnvironmentName:
    Type: String
    Default: stg
    MaxLength: 4
    AllowedPattern: '^[a-z0-9-]+$'
    Description: Environment identifier used for tags and names.

  AvailabilityZoneA:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-1a
    Description: Availability Zone for A-side public, private application, and private DB subnets.

  AvailabilityZoneC:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-1c
    Description: Availability Zone for C-side public, private application, and private DB subnets.

  VpcCidr:
    Type: String
    Default: 172.28.48.0/20
    Description: CIDR block for the staging VPC.

  PublicSubnetACidr:
    Type: String
    Default: 172.28.48.0/24
    Description: CIDR block for the public subnet in AZ A.

  PublicSubnetCCidr:
    Type: String
    Default: 172.28.49.0/24
    Description: CIDR block for the public subnet in AZ C.

  PrivateAppSubnetACidr:
    Type: String
    Default: 172.28.50.0/24
    Description: CIDR block for the private application subnet in AZ A.

  PrivateAppSubnetCCidr:
    Type: String
    Default: 172.28.51.0/24
    Description: CIDR block for the private application subnet in AZ C.

  PrivateDbSubnetACidr:
    Type: String
    Default: 172.28.52.0/24
    Description: CIDR block for the private DB subnet in AZ A.

  PrivateDbSubnetCCidr:
    Type: String
    Default: 172.28.53.0/24
    Description: CIDR block for the private DB subnet in AZ C.

  AllowedAdminCidr:
    Type: String
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$'
    Description: Administrator source CIDR for SSH access to the bastion host.

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair name for Linux and Windows instances.

  LinuxAmiId:
    Type: AWS::EC2::Image::Id
    Description: Amazon Linux 2023 AMI ID for the bastion and Linux application server.

  WindowsAmiId:
    Type: AWS::EC2::Image::Id
    Description: Windows Server AMI ID for the Windows application server.

  BastionInstanceType:
    Type: String
    Default: t3a.small
    AllowedValues:
      - t3.small
      - t3.medium
      - t3a.small
      - t3a.medium
    Description: EC2 instance type for the bastion host.

  LinuxInstanceType:
    Type: String
    Default: t3a.medium
    AllowedValues:
      - t3.medium
      - t3.large
      - t3a.medium
      - t3a.large
      - m6a.large
      - m6a.xlarge
    Description: EC2 instance type for the Linux application server.

  WindowsInstanceType:
    Type: String
    Default: t3a.medium
    AllowedValues:
      - t3.medium
      - t3.large
      - t3a.medium
      - t3a.large
      - m6a.large
      - m6a.xlarge
    Description: EC2 instance type for the Windows application server.

  DbInstanceClass:
    Type: String
    Default: db.m6g.large
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
      - db.m6g.large
      - db.m6i.large
    Description: RDS instance class for the sample database.

  DbEngine:
    Type: String
    Default: postgres
    AllowedValues:
      - postgres
    Description: RDS engine for this PoC template.

  DbEngineVersion:
    Type: String
    Default: '17.5'
    Description: RDS PostgreSQL engine version.

  DbAllocatedStorage:
    Type: Number
    Default: 100
    MinValue: 20
    MaxValue: 65536
    Description: RDS allocated storage in GiB.

  DbName:
    Type: String
    Default: appdb
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]{0,63}$'
    Description: Initial database name.

  DbPort:
    Type: Number
    Default: 5432
    MinValue: 1
    MaxValue: 65535
    Description: Database listener port allowed from application servers.

  DbMasterUsername:
    Type: String
    Default: dbadmin
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]{0,15}$'
    Description: RDS master username.

  DbMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 128
    AllowedPattern: '^[a-zA-Z0-9!#$%&()*+,.:;<=>?\[\]^_{|}~-]+$'
    Description: RDS master password. Use Secrets Manager or a secure process in real environments.

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-igw'

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Ref AvailabilityZoneA
      CidrBlock: !Ref PublicSubnetACidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-public-subnet-a'

  PublicSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Ref AvailabilityZoneC
      CidrBlock: !Ref PublicSubnetCCidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-public-subnet-c'

  PrivateAppSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Ref AvailabilityZoneA
      CidrBlock: !Ref PrivateAppSubnetACidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-app-subnet-a'

  PrivateAppSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Ref AvailabilityZoneC
      CidrBlock: !Ref PrivateAppSubnetCCidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-app-subnet-c'

  PrivateDbSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Ref AvailabilityZoneA
      CidrBlock: !Ref PrivateDbSubnetACidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-db-subnet-a'

  PrivateDbSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Ref AvailabilityZoneC
      CidrBlock: !Ref PrivateDbSubnetCCidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-db-subnet-c'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-public-rtb'

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetCRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetC
      RouteTableId: !Ref PublicRouteTable

  NatEipA:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-nat-eip-a'

  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEipA.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-nat-a'

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-private-rtb'

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayA

  PrivateAppSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateAppSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateAppSubnetCRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateAppSubnetC
      RouteTableId: !Ref PrivateRouteTable

  PrivateDbSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDbSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateDbSubnetCRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDbSubnetC
      RouteTableId: !Ref PrivateRouteTable

  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow administrator SSH access to the bastion host.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedAdminCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-bastion-sg'

  AppAlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access to the Linux internal ALB from the VPC.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref VpcCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-app-ilb-sg'

  WindowsAlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access to the Windows internal ALB from the VPC.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref VpcCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-win-ilb-sg'

  LinuxSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow traffic from Linux internal ALB and SSH from bastion.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref AppAlbSecurityGroup
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !Ref BastionSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-linux-sg'

  WindowsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow traffic from Windows internal ALB and RDP from bastion.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref WindowsAlbSecurityGroup
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          SourceSecurityGroupId: !Ref BastionSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-windows-sg'

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow database access from application servers.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref DbPort
          ToPort: !Ref DbPort
          SourceSecurityGroupId: !Ref LinuxSecurityGroup
        - IpProtocol: tcp
          FromPort: !Ref DbPort
          ToPort: !Ref DbPort
          SourceSecurityGroupId: !Ref WindowsSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-db-sg'

  BastionInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LinuxAmiId
      InstanceType: !Ref BastionInstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnetA
      SecurityGroupIds:
        - !Ref BastionSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-bastion-01'

  LinuxInstanceA:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LinuxAmiId
      InstanceType: !Ref LinuxInstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref PrivateAppSubnetA
      SecurityGroupIds:
        - !Ref LinuxSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf install -y httpd
          systemctl enable --now httpd
          echo "aws-windows-ilb-poc ${EnvironmentName} linux-app-01" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-linux-app-01'

  WindowsInstanceA:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAmiId
      InstanceType: !Ref WindowsInstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref PrivateAppSubnetA
      SecurityGroupIds:
        - !Ref WindowsSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          <powershell>
          Install-WindowsFeature -Name Web-Server -IncludeManagementTools
          Set-Content -Path C:\inetpub\wwwroot\index.html -Value "aws-windows-ilb-poc ${EnvironmentName} windows-app-01"
          </powershell>
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-windows-app-01'

  AppInternalLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}-app-ilb'
      Scheme: internal
      Type: application
      SecurityGroups:
        - !Ref AppAlbSecurityGroup
      Subnets:
        - !Ref PrivateAppSubnetA
        - !Ref PrivateAppSubnetC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-app-ilb'

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}-app-tg'
      VpcId: !Ref Vpc
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: /
      Matcher:
        HttpCode: 200-399
      Targets:
        - Id: !Ref LinuxInstanceA
          Port: 80
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-app-tg'

  AppListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppInternalLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  WindowsInternalLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}-win-ilb'
      Scheme: internal
      Type: application
      SecurityGroups:
        - !Ref WindowsAlbSecurityGroup
      Subnets:
        - !Ref PrivateAppSubnetA
        - !Ref PrivateAppSubnetC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-win-ilb'

  WindowsTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}-win-tg'
      VpcId: !Ref Vpc
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: /
      Matcher:
        HttpCode: 200-399
      Targets:
        - Id: !Ref WindowsInstanceA
          Port: 80
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-win-tg'

  WindowsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref WindowsInternalLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WindowsTargetGroup

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private DB subnet group for the PoC database.
      SubnetIds:
        - !Ref PrivateDbSubnetA
        - !Ref PrivateDbSubnetC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-db-subnet-group'

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-${EnvironmentName}-db'
      DBInstanceClass: !Ref DbInstanceClass
      Engine: !Ref DbEngine
      EngineVersion: !Ref DbEngineVersion
      Port: !Ref DbPort
      AllocatedStorage: !Ref DbAllocatedStorage
      StorageType: gp3
      DBName: !Ref DbName
      MasterUsername: !Ref DbMasterUsername
      MasterUserPassword: !Ref DbMasterPassword
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref DbSecurityGroup
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 7
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-db'

Outputs:
  VpcId:
    Description: VPC ID.
    Value: !Ref Vpc

  BastionPublicIp:
    Description: Public IP address of the bastion host.
    Value: !GetAtt BastionInstance.PublicIp

  AppInternalLoadBalancerDnsName:
    Description: Linux application internal load balancer DNS name.
    Value: !GetAtt AppInternalLoadBalancer.DNSName

  WindowsInternalLoadBalancerDnsName:
    Description: Windows application internal load balancer DNS name.
    Value: !GetAtt WindowsInternalLoadBalancer.DNSName

  LinuxInstanceAId:
    Description: Linux application server 01 instance ID.
    Value: !Ref LinuxInstanceA

  WindowsInstanceAId:
    Description: Windows application server 01 instance ID.
    Value: !Ref WindowsInstanceA

  DatabaseEndpoint:
    Description: RDS endpoint address.
    Value: !GetAtt Database.Endpoint.Address
