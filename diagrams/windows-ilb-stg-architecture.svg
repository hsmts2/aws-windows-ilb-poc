<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Staging Windows ILB architecture</title>
  <desc id="desc">Architecture diagram for the staging environment.</desc>
  <defs>
    <style>
      .frame { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .vpc { fill: #fafafa; stroke: #7c3aed; stroke-width: 2; }
      .az { fill: none; stroke: #0891b2; stroke-width: 2; stroke-dasharray: 8 6; }
      .public { fill: #ecfdf5; stroke: #16a34a; stroke-width: 1.5; }
      .private { fill: #eff6ff; stroke: #0284c7; stroke-width: 1.5; }
      .db { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .service { fill: #fff7ed; stroke: #f97316; stroke-width: 1.5; }
      .lb { fill: #fce7f3; stroke: #db2777; stroke-width: 1.5; }
      .text { font-family: Arial, "Yu Gothic", sans-serif; fill: #111827; font-size: 18px; }
      .small { font-size: 15px; }
      .tiny { font-size: 13px; }
      .title { font-size: 28px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>

  <rect x="20" y="20" width="1160" height="680" class="frame" />
  <text x="48" y="68" class="text title">Staging Environment</text>
  <text x="48" y="96" class="text small">VPC: aws-windows-ilb-poc-stg-vpc / 172.28.48.0/20</text>

  <rect x="190" y="115" width="940" height="535" class="vpc" />
  <text x="215" y="150" class="text label">AWS Cloud</text>

  <rect x="250" y="170" width="405" height="435" class="az" />
  <rect x="680" y="170" width="405" height="435" class="az" />
  <text x="370" y="198" class="text label" fill="#0891b2">ap-northeast-1a</text>
  <text x="800" y="198" class="text label" fill="#0891b2">ap-northeast-1c</text>

  <rect x="280" y="225" width="340" height="90" rx="4" class="public" />
  <text x="300" y="255" class="text label">stg-public-subnet-a</text>
  <text x="300" y="285" class="text small">172.28.48.0/24</text>
  <text x="520" y="285" class="text small">Bastion / NAT</text>

  <rect x="710" y="225" width="340" height="90" rx="4" class="public" />
  <text x="730" y="255" class="text label">stg-public-subnet-c</text>
  <text x="730" y="285" class="text small">172.28.49.0/24</text>

  <rect x="280" y="340" width="340" height="100" rx="4" class="private" />
  <text x="300" y="370" class="text label">stg-app-subnet-a</text>
  <text x="300" y="400" class="text small">172.28.50.0/24</text>
  <text x="490" y="400" class="text small">Linux / Windows</text>

  <rect x="710" y="340" width="340" height="100" rx="4" class="private" />
  <text x="730" y="370" class="text label">stg-app-subnet-c</text>
  <text x="730" y="400" class="text small">172.28.51.0/24</text>

  <rect x="280" y="465" width="340" height="100" rx="4" class="db" />
  <text x="300" y="495" class="text label">stg-db-subnet-a</text>
  <text x="300" y="525" class="text small">172.28.52.0/24</text>
  <text x="500" y="525" class="text small">RDS Single-AZ</text>

  <rect x="710" y="465" width="340" height="100" rx="4" class="db" />
  <text x="730" y="495" class="text label">stg-db-subnet-c</text>
  <text x="730" y="525" class="text small">172.28.53.0/24</text>

  <rect x="48" y="250" width="115" height="64" rx="6" class="service" />
  <text x="76" y="278" class="text label">User</text>
  <text x="62" y="300" class="text tiny">authenticated</text>

  <rect x="430" y="300" width="250" height="54" rx="6" class="lb" />
  <text x="458" y="334" class="text label">stg-app-ilb</text>

  <rect x="650" y="300" width="285" height="54" rx="6" class="lb" />
  <text x="678" y="334" class="text label">stg-win-ilb</text>

  <path d="M163 282 C210 282, 225 270, 280 270" class="line" />
  <path d="M560 354 C560 370, 520 385, 520 400" class="line" />
  <path d="M795 354 C795 370, 850 385, 850 400" class="line" />
  <path d="M520 440 C520 460, 520 480, 520 515" class="dash" />

  <text x="48" y="640" class="text tiny">Staging topology: public, application, and database subnets with internal load balancers.</text>
</svg>
